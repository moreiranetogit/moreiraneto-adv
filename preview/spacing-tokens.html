<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',system-ui,sans-serif; background:#F4F6F9; padding:20px; }
  .grid { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background:linear-gradient(180deg,#E8941F,#C47A10); border-radius:3px; width:28px; }
  .name { font-size:9px; font-weight:700; color:#2D2D2D; font-family:monospace; }
  .val  { font-size:9px; color:#666; font-family:monospace; }
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="bar" style="height:4px;"></div><div class="name">sp-1</div><div class="val">4px</div></div>
    <div class="item"><div class="bar" style="height:8px;"></div><div class="name">sp-2</div><div class="val">8px</div></div>
    <div class="item"><div class="bar" style="height:12px;"></div><div class="name">sp-3</div><div class="val">12px</div></div>
    <div class="item"><div class="bar" style="height:16px;"></div><div class="name">sp-4</div><div class="val">16px</div></div>
    <div class="item"><div class="bar" style="height:20px;"></div><div class="name">sp-5</div><div class="val">20px</div></div>
    <div class="item"><div class="bar" style="height:24px;"></div><div class="name">sp-6</div><div class="val">24px</div></div>
    <div class="item"><div class="bar" style="height:32px;"></div><div class="name">sp-8</div><div class="val">32px</div></div>
    <div class="item"><div class="bar" style="height:40px;"></div><div class="name">sp-10</div><div class="val">40px</div></div>
    <div class="item"><div class="bar" style="height:48px;"></div><div class="name">sp-12</div><div class="val">48px</div></div>
    <div class="item"><div class="bar" style="height:64px;"></div><div class="name">sp-16</div><div class="val">64px</div></div>
    <div class="item"><div class="bar" style="height:80px;"></div><div class="name">sp-20</div><div class="val">80px</div></div>
  </div>
</body></html>
