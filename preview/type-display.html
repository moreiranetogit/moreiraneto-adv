<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #F5E6D3; padding: 24px; }
  .row { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid rgba(0,0,0,0.07); }
  .row:last-child { border-bottom: none; margin-bottom: 0; }
  .meta { font-size: 10px; color: #9CA3AF; font-family: monospace; margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">H1 · Lora · 48px · 700 · tracking -1px</div>
    <div style="font-family:'Lora',serif;font-size:48px;font-weight:700;color:#2D2D2D;letter-spacing:-1px;line-height:1.1;">Direito Agrário</div>
  </div>
  <div class="row">
    <div class="meta">H2 · Lora · 32px · 700 · tracking -0.5px</div>
    <div style="font-family:'Lora',serif;font-size:32px;font-weight:700;color:#2D2D2D;letter-spacing:-0.5px;line-height:1.2;">Seja bem-vindo ao Moreira Neto</div>
  </div>
  <div class="row">
    <div class="meta">H3 · Lora · 24px · 700</div>
    <div style="font-family:'Lora',serif;font-size:24px;font-weight:700;color:#2D2D2D;line-height:1.3;">Arrendamento e Parceria Agrícola</div>
  </div>
  <div class="row">
    <div class="meta">Overline · Inter · 13px · 600 · ALL CAPS · spacing 2px · Gold</div>
    <div style="font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#E8941F;text-transform:uppercase;letter-spacing:2px;">Expertise Jurídica</div>
  </div>
</body>
</html>
