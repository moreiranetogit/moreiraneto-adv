<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#F5E6D3; padding:24px; }
  .section { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:20px; }
  .label { font-size:10px; font-weight:700; color:#9CA3AF; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-family:monospace; }
  .btn { display:inline-flex; align-items:center; gap:8px; font-family:'Inter',sans-serif; font-weight:600; cursor:pointer; text-decoration:none; border:none; }
  .btn-lg { padding:16px 32px; font-size:15px; border-radius:6px; }
  .btn-md { padding:12px 24px; font-size:14px; border-radius:6px; }
  .btn-sm { padding:8px 16px; font-size:13px; border-radius:6px; }
  .primary { background:#E8941F; color:#2D2D2D; }
  .secondary { background:#1a1a1a; color:#E8941F; border:2px solid #E8941F; }
  .ghost { background:transparent; color:#E8941F; border:2px solid #E8941F; }
  .whatsapp { background:#25D366; color:#fff; }
  .dark-bg { background:#2C2C2C; padding:16px; border-radius:8px; }
  .divider { width:100%; height:1px; background:rgba(0,0,0,0.08); margin:8px 0 16px; }
</style>
</head>
<body>
  <div class="label">Primary — Gold Fill</div>
  <div class="section">
    <button class="btn btn-lg primary">Agende uma Consulta</button>
    <button class="btn btn-md primary">Leia Radar Jurídico →</button>
    <button class="btn btn-sm primary">Saiba Mais</button>
  </div>
  <div class="divider"></div>
  <div class="label">Secondary — Dark + Gold Border</div>
  <div class="section">
    <button class="btn btn-lg secondary">Conheça Nossas Áreas</button>
    <button class="btn btn-md secondary">Ver no Mapa</button>
  </div>
  <div class="divider"></div>
  <div class="label">Ghost & Special</div>
  <div class="section">
    <button class="btn btn-md ghost">E-mail</button>
    <button class="btn btn-md whatsapp">WhatsApp</button>
    <div class="dark-bg">
      <button class="btn btn-md primary">Agendar Consulta</button>
    </div>
  </div>
</body>
</html>
